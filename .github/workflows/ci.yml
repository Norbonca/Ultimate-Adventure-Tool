name: CI

# ============================================================
# LOCAL-FIRST WORKFLOW
# ============================================================
# 1. Fejlesztés és tesztelés a local dev environment-ben
#    (pnpm local:start → pnpm dev → manuális teszt)
# 2. Feature branch-re push → PR nyitás main felé
# 3. Ez a CI workflow automatikusan fut a PR-en
# 4. Ha zöld → merge main-be → Vercel automatikusan deployol
#    + supabase db push automatikusan lefut (DB szinkron!)
# ============================================================

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]  # Vercel deploy utáni ellenőrzés

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true  # TODO: strict-re váltás ha 0 lint hiba

      - name: Type check
        run: pnpm type-check
        continue-on-error: true  # TODO: strict-re váltás ha 0 type hiba

      - name: Build
        run: pnpm build

  db-push:
    name: Supabase DB Push
    runs-on: ubuntu-latest
    # Csak main-re push esetén fut (ne fusson PR-en)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci  # Csak ha a build sikeres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB migrations
        # SUPABASE_DB_PASSWORD szükséges: Supabase Dashboard → Project Settings → Database → Reset password
        # Majd: GitHub → Settings → Secrets → SUPABASE_DB_PASSWORD
        run: |
          supabase link --project-ref rpwajsbxrvypeqaalhvd
          supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
